name: Build kakuyomudl

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lazarus
        run: |
          choco install lazarus -y --no-progress --limit-output
          $lazarusDir = Get-ChildItem -Path "C:\" -Directory -Filter "lazarus*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lazarusDir) {
            $lazarusDir = Get-ChildItem -Path "C:\Program Files" -Directory -Filter "lazarus*" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($lazarusDir) {
            "$($lazarusDir.FullName)" | Out-File -Append -FilePath $env:GITHUB_PATH
            Write-Host "Lazarus found at: $($lazarusDir.FullName)"
          } else {
            Write-Error "Cannot find Lazarus installation directory"
            exit 1
          }

      - name: Build (Release)
        run: lazbuild --build-mode=Release kakuyomudl.lpi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kakuyomudl
          path: kakuyomudl.exe
